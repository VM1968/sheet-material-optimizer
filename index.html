<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оптимальный раскрой листового материала</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">📐 Оптимизатор раскроя</span>
        </div>
    </nav>

    <div class="container-fluid mt-5">
        <div class="row">
            <!-- Левая колонка - ввод данных -->
            <!-- Ширина инструмента для резки -->
            <div class="col-lg-4">
                <div class="card shadow mb-3">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">🛠️ Общие настройки</h5> <!--⚙️-->
                    </div>
                    <div class="card-body">
                        <div class="sheet-card active">
                            <label class="form-label">Припуск при резке (мм)</label>
                            <input id="sheet_margin" type="number" class="form-control form-control-sm"
                                placeholder="Припуск" value="0">
                        </div>
                    </div>
                </div>
                <!-- <br> -->
                <!-- Листы материала -->
                <div class="card shadow mb-3">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">📋 Листы материала</h5>
                    </div>
                    <div class="card-body">
                        <div id="sheetsContainer">
                            <!-- Динамически добавляются листы -->
                        </div>
                        <button type="button" class="btn btn-primary w-100 mb-2" id="addSheetBtn">
                            + Добавить лист
                        </button>
                        <button type="button" class="btn btn-outline-secondary w-100 btn-sm" id="presetsBtn"
                            data-bs-toggle="modal" data-bs-target="#presetsModal">
                            📦 Стандартные размеры
                        </button>
                    </div>
                </div>

                <!-- Детали для раскроя -->
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">✂️ Детали для раскроя</h5>
                    </div>
                    <div class="card-body">
                        <form id="detailForm">
                            <div class="mb-2">
                                <label for="detailLength" class="form-label">Длина детали (мм)</label>
                                <input type="number" class="form-control" id="detailLength" required>
                            </div>
                            <div class="mb-2">
                                <label for="detailWidth" class="form-label">Ширина детали (мм)</label>
                                <input type="number" class="form-control" id="detailWidth" required>
                            </div>
                            <div class="mb-2">
                                <label for="detailQuantity" class="form-label">Количество</label>
                                <input type="number" class="form-control" id="detailQuantity" value="1" required>
                            </div>
                            <div class="mb-2">
                                <label for="detailRotation" class="form-label">Поворот</label>
                                <select class="form-select" id="detailRotation">
                                    <option value="free">Свободно</option>
                                    <option value="fixed">Зафиксировано</option>
                                </select>
                            </div>
                            <button type="button" class="btn btn-success w-100" id="addDetailBtn">Добавить
                                деталь</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Правая колонка - результаты -->
            <div class="col-lg-8">
                <div class="card shadow mb-4">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0">📝 Список деталей</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-sm table-hover" id="detailsTable">
                                <thead class="table-light">
                                    <tr>
                                        <th>Длина</th>
                                        <th>Ширина</th>
                                        <th>Кол-во</th>
                                        <th>Поворот</th>
                                        <th>Площадь</th>
                                        <th>Действие</th>
                                    </tr>
                                </thead>
                                <tbody id="detailsTableBody">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2 mb-4">
                    <button type="button" class="btn btn-primary btn-lg flex-grow-1" id="optimizeBtn">
                        🚀 Оптимизировать раскрой
                    </button>
                    <button type="button" class="btn btn-secondary btn-lg" id="printBtn" style="display:none;">
                        🖨️ Печать
                    </button>
                </div>

                <div id="resultsContainer"></div>
            </div>
        </div>
    </div>

    <!-- Modal для стандартных размеров -->
    <div class="modal fade" id="presetsModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Стандартные размеры листов</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="presetsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Скрытый контейнер для печати -->
    <div id="printContainer" style="display:none;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
