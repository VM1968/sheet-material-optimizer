<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оптимальный раскрой листового материала</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">📐 Оптимизатор раскроя</span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <!-- Левая колонка - ввод данных -->
            <div class="col-lg-4">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Параметры листа</h5>
                    </div>
                    <div class="card-body">
                        <form id="sheetForm">
                            <div class="mb-3">
                                <label for="sheetLength" class="form-label">Длина листа (мм)</label>
                                <input type="number" class="form-control" id="sheetLength" value="2500" required>
                            </div>
                            <div class="mb-3">
                                <label for="sheetWidth" class="form-label">Ширина листа (мм)</label>
                                <input type="number" class="form-control" id="sheetWidth" value="1250" required>
                            </div>
                            <div class="mb-3">
                                <label for="materialCost" class="form-label">Стоимость листа (руб)</label>
                                <input type="number" class="form-control" id="materialCost" value="1000" step="0.01">
                            </div>
                            <div class="mb-3">
                                <label for="margin" class="form-label">Припуск при резке (мм)</label>
                                <input type="number" class="form-control" id="margin" value="2">
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card shadow mt-4">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">Детали для раскроя</h5>
                    </div>
                    <div class="card-body">
                        <form id="detailForm">
                            <div class="mb-2">
                                <label for="detailLength" class="form-label">Длина детали (мм)</label>
                                <input type="number" class="form-control" id="detailLength" required>
                            </div>
                            <div class="mb-2">
                                <label for="detailWidth" class="form-label">Ширина детали (мм)</label>
                                <input type="number" class="form-control" id="detailWidth" required>
                            </div>
                            <div class="mb-2">
                                <label for="detailQuantity" class="form-label">Количество</label>
                                <input type="number" class="form-control" id="detailQuantity" value="1" required>
                            </div>
                            <button type="button" class="btn btn-success w-100" id="addDetailBtn">Добавить деталь</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Правая колонка - результаты -->
            <div class="col-lg-8">
                <div class="card shadow mb-4">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0">Список деталей</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-sm table-hover" id="detailsTable">
                                <thead class="table-light">
                                    <tr>
                                        <th>Длина</th>
                                        <th>Ширина</th>
                                        <th>Кол-во</th>
                                        <th>Площадь</th>
                                        <th>Действие</th>
                                    </tr>
                                </thead>
                                <tbody id="detailsTableBody">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <button type="button" class="btn btn-primary btn-lg w-100 mb-4" id="optimizeBtn">
                    🚀 Оптимизировать раскрой
                </button>

                <div id="resultsContainer"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
